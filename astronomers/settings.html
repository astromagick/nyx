    <div class="main-content">
        <h4>v0.01</h4>
        <h1>settings</h1>
        <div class="setting">
            <p>dark mode</p>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
            <script>
                const toggleSwitch = document.getElementById('themeToggle');
                const currentTheme = localStorage.getItem('theme');

                if (currentTheme) {
                    document.body.classList.add(currentTheme);

                    if (currentTheme === 'dark-mode') {
                        toggleSwitch.checked = true;
                    }
                }

                toggleSwitch.addEventListener('change', function() {
                    if (this.checked) {
                        document.body.classList.remove('dark-mode');
                        localStorage.setItem('theme', 'dark-mode');
                    } else {
                        document.body.classList.add('dark-mode');
                        localStorage.setItem('theme', 'light-mode');
                    }
                    console.log('Theme changed to:', this.checked ? 'dark-mode' : 'light-mode');
                });
            </script>
        </div>
        <div class="setting">
            <label for="language" style="padding-top: 1em;padding-bottom: 1em;">language</label>
            <select id="language" name="language">
                <option value="en"selected>english</option>
                <option value="zh-s">简体中文</option>
                <option value="zh-t">繁體中文</option>
                <option value="ca">粤語</option>
                <option value="kr">한국어</option>
                <option value="jp">日本語</option>
                <option value="es">spanish</option>
                <option value="pt-br">português (brazil)</option>
            </select>
        </div>
        <div class="setting">
            <p>theme</p>
            <div class="setting-item">
                <input type="color" id="bg-color-picker" value="#1e1e1e"> 
            </div>
            <script src="../theme.js"></script> 

        </div>
        <p class="pfoot">designed by ashton smith [24505]</p>
